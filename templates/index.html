<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Log Analyzer Dashboard</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(-45deg, #0b1120, #111827, #020617, #0f172a);
    background-size: 400% 400%;
    animation: gradientBG 10s ease infinite;
    color: #e2e8f0;
}

@keyframes gradientBG {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
}

.container {
    max-width: 800px;
    margin: 80px auto;
    padding: 30px;
    background: rgba(17, 24, 39, 0.85);
    backdrop-filter: blur(10px);
    border-radius: 15px;
    box-shadow: 0 0 40px rgba(0,0,0,0.7);
    text-align: center;
    animation: fadeIn 1.2s ease;
}

@keyframes fadeIn {
    from { opacity: 0; transform: translateY(30px);}
    to { opacity: 1; transform: translateY(0);}
}

h1 {
    margin-bottom: 10px;
    animation: slideDown 1s ease;
}

@keyframes slideDown {
    from { transform: translateY(-20px); opacity: 0;}
    to { transform: translateY(0); opacity: 1;}
}

p {
    color: #94a3b8;
    margin-bottom: 25px;
}

input[type="file"] {
    padding: 10px;
    border-radius: 6px;
    border: none;
    background: #1f2937;
    color: white;
}

button {
    margin-top: 15px;
    padding: 12px 25px;
    background: linear-gradient(135deg, #22c55e, #4ade80);
    border: none;
    color: black;
    font-weight: bold;
    border-radius: 8px;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    transform: scale(1.08);
    box-shadow: 0 0 15px #22c55e;
}

.results {
    margin-top: 30px;
    text-align: left;
}

.alert, .warning {
    padding: 12px;
    margin-bottom: 12px;
    border-radius: 8px;
    animation: popIn 0.5s ease;
}

@keyframes popIn {
    from { transform: scale(0.8); opacity: 0;}
    to { transform: scale(1); opacity: 1;}
}

.alert {
    background: rgba(239, 68, 68, 0.15);
    border-left: 5px solid #ef4444;
}

.warning {
    background: rgba(245, 158, 11, 0.15);
    border-left: 5px solid #f59e0b;
}

.footer {
    margin-top: 20px;
    font-size: 12px;
    color: #64748b;
}

/* glowing effect */
.container:hover {
    box-shadow: 0 0 50px rgba(34, 197, 94, 0.3);
}
</style>
</head>

<body>

<div class="container">

    <h1>🔐 Log Analyzer Dashboard</h1>
    <p>Analyze logs to detect suspicious activity and brute force attacks</p>

    <form method="POST" enctype="multipart/form-data">
        <input type="file" name="logfile" required>
        <br>
        <button type="submit">Analyze Logs</button>
    </form>

    <div class="results">
        {% for result in results %}
            <div class="{% if 'ALERT' in result %}alert{% else %}warning{% endif %}">
                {{ result }}
            </div>
        {% endfor %}
    </div>

    <div class="footer">
        Built with 💻 for Cybersecurity Analysis
    </div>

</div>

</body>
</html>
